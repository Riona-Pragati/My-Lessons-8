<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Multiplying various numbers using JavaScript.</p>
    <button type="button" onclick="myFunction()">Click Me!</button>
    <p id="demo"></p>
    <p id="demo1"></p>
    <p id="demo2"></p>
    <script>
        function myFunction() {
    var a = 16
        b = 20;
    
    var c = 25
        d = 14;

    var e = 12
        f = 15;

    document.getElementById("demo").innerHTML = a*b;
    document.getElementById("demo1").innerHTML = c*d;
    document.getElementById("demo2").innerHTML = e*f;
}
    </script>
</body>
</html>
